<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherNow- Real-Time Data Dashboard with Fetch API & jQuery </title>

   <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

</head>
<body>

  <!--HEADER-->
  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">🌤</span>
      <span class="brand-name">WeatherNow</span>
    </div>
 
    <!-- Unit toggle (Bonus: Celsius / Fahrenheit) -->
    <div class="unit-toggle">
      <button id="btn-celsius" class="unit-btn active" aria-label="Switch to Celsius">°C</button>
      <span class="unit-sep">|</span>
      <button id="btn-fahrenheit" class="unit-btn" aria-label="Switch to Fahrenheit">°F</button>
    </div>
  </header>

  <!--MAIN CONTENT-->
  <main class="container">
 
    <!-- Search Bar -->
    <section class="search-section" aria-label="City search">
      <div class="search-wrapper">
        <input
          type="text"
          id="city-input"
          class="search-input"
          placeholder="Search for a city…"
          autocomplete="off"
          aria-label="Enter city name"
          maxlength="60"
        />
        <button id="search-btn" class="search-btn" aria-label="Search weather">
          <span class="btn-icon">🔍</span>
          <span class="btn-text">Search</span>
        </button>
      </div>
 
      <!-- Validation message -->
      <p id="validation-msg" class="validation-msg" role="alert" aria-live="polite"></p>
 
      <!-- Error banner (network / HTTP / timeout errors) -->
      <div id="error-banner" class="error-banner hidden" role="alert">
        <span id="error-text" class="error-text"></span>
        <button id="retry-btn" class="retry-btn">↺ Retry</button>
      </div>
  
</body>
</html>
