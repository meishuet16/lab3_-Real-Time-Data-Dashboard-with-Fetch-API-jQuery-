<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherNow- Real-Time Data Dashboard with Fetch API & jQuery </title>

   <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

</head>
<body>

  <!--HEADER-->
  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">🌤</span>
      <span class="brand-name">WeatherNow</span>
    </div>
 
    <!-- Unit toggle (Bonus: Celsius / Fahrenheit) -->
    <div class="unit-toggle">
      <button id="btn-celsius" class="unit-btn active" aria-label="Switch to Celsius">°C</button>
      <span class="unit-sep">|</span>
      <button id="btn-fahrenheit" class="unit-btn" aria-label="Switch to Fahrenheit">°F</button>
    </div>
  </header>

  <!--MAIN CONTENT-->
  <main class="container">
 
    <!-- Search Bar -->
    <section class="search-section" aria-label="City search">
      <div class="search-wrapper">
        <input
          type="text"
          id="city-input"
          class="search-input"
          placeholder="Search for a city…"
          autocomplete="off"
          aria-label="Enter city name"
          maxlength="60"
        />
        <button id="search-btn" class="search-btn" aria-label="Search weather">
          <span class="btn-icon">🔍</span>
          <span class="btn-text">Search</span>
        </button>
      </div>
 
      <!-- Validation message -->
      <p id="validation-msg" class="validation-msg" role="alert" aria-live="polite"></p>
 
      <!-- Error banner (network / HTTP / timeout errors) -->
      <div id="error-banner" class="error-banner hidden" role="alert">
        <span id="error-text" class="error-text"></span>
        <button id="retry-btn" class="retry-btn">↺ Retry</button>
      </div>

    </section>

     <!--CURRENT WEATHER CARD-->
    <section id="current-card" class="current-card" aria-label="Current weather">
      <div class="current-left">
        <div id="city-name"    class="city-name skeleton skeleton-text">          </div>
        <div id="local-time"   class="local-time skeleton skeleton-text-sm">      </div>
        <div id="weather-desc" class="weather-desc skeleton skeleton-text-sm">    </div>
      </div>
 
      <div class="current-center">
        <div id="weather-icon" class="weather-icon skeleton skeleton-circle">     </div>
        <div id="temperature"  class="temperature skeleton skeleton-text-lg">     </div>
      </div>
 
      <div class="current-right">
        <div class="detail-row">
          <span class="detail-label">Humidity</span>
          <span id="humidity"   class="detail-value skeleton skeleton-text-sm">   </span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Wind</span>
          <span id="wind-speed" class="detail-value skeleton skeleton-text-sm">   </span>
        </div>
      </div>
    </section>
 
    <!--7-DAY FORECAST ROW-->
    <section class="forecast-section" aria-label="7-day forecast">
      <h2 class="section-title">7-Day Forecast</h2>
      <div id="forecast-row" class="forecast-row">
        <!-- 7 skeleton cards generated by JS on page load -->
      </div>
    </section>
 
  </main>

   <!--FOOTER-->
  <footer class="site-footer">
    <p>Data: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> &amp;
       <a href="https://worldtimeapi.org" target="_blank" rel="noopener">WorldTimeAPI</a> — Free &amp; No-Auth APIs</p>
  </footer>
  
</body>
</html>
